name: cupet_app
description: "CuPet — a dating app for pets."
publish_to: 'none'
version: 1.0.1+6

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7
  bloc: ^9.0.0

  # Routing
  go_router: ^14.6.2

  # Networking
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # DI
  get_it: ^8.0.3

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # UI
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1
  appinio_swiper: ^2.1.1

  # Media
  image_picker: ^1.1.2

  # Firebase
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  firebase_messaging: ^15.1.5

  # Local notifications (foreground FCM banners)
  flutter_local_notifications: ^18.0.1

  # Realtime (socket-hub / Socket.IO)

  # Network connectivity (gate socket reconnection so it never hammers offline)
  connectivity_plus: ^6.1.0

  # Utils
  intl: ^0.19.0
  ably_flutter: ^1.2.44

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icon/

flutter_launcher_icons:
  image_path: "assets/icon/icon.png"
  android: "ic_launcher"
  min_sdk_android: 21
  adaptive_icon_background: "#FFD23F"
  adaptive_icon_foreground: "assets/icon/icon.png"
  ios: true
  remove_alpha_ios: true
