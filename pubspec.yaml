name: cupet_app
description: "CuPet — a dating app for pets."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7
  bloc: ^9.0.0

  # Routing
  go_router: ^14.6.2

  # Networking
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # DI
  get_it: ^8.0.3

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # UI
  cached_network_image: ^3.4.1
  google_fonts: ^6.2.1
  appinio_swiper: ^2.1.1

  # Media / location
  image_picker: ^1.1.2
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Firebase
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  firebase_messaging: ^15.1.5

  # Realtime (Reverb / Pusher protocol)
  pusher_channels_flutter: ^2.4.0

  # Utils
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
