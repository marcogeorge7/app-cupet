name: iOS Release

# Builds and uploads to TestFlight on every push to `main` (build number = git
# commit count, version = pubspec). App Store submission is done MANUALLY in App
# Store Connect afterwards. You can also push a `v1.0.2` tag to stamp an explicit
# version, or run it by hand from the Actions tab (workflow_dispatch).
on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Marketing version (e.g. 1.0.2). Blank = use pubspec.'
        required: false

jobs:
  release:
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so `git rev-list --count` is correct

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Resolve version + build number
        id: ver
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="$(grep '^version:' pubspec.yaml | sed -E 's/version:[[:space:]]*//; s/\+.*//')"
          fi
          BUILD="$(git rev-list --count HEAD)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"
          echo "Building $VERSION ($BUILD)"

      - name: flutter pub get
        run: flutter pub get

      - name: Build Flutter (unsigned — fastlane signs + archives next)
        run: >
          flutter build ios --release --no-codesign
          --build-name=${{ steps.ver.outputs.version }}
          --build-number=${{ steps.ver.outputs.build }}

      - name: CocoaPods
        working-directory: ios
        run: |
          bundle install
          bundle exec pod install

      - name: Archive + upload to TestFlight
        working-directory: ios
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
        run: bundle exec fastlane beta

      - name: Print full build log on failure
        if: failure()
        run: cat "$HOME/Library/Logs/gym/"*.log 2>/dev/null || true
